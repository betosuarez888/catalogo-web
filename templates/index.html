<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mi Catálogo</title>
  
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">

</head>

<body class="bg-light">
  <div class="container py-4">
    <h1 class="text-center mb-4">Mi Catálogo</h1>

    <p class="telefono-contacto">
      <a href="https://wa.me/5493794256156" target="_blank">
        📱 3794 256156
      </a>
    </p>

    <div class="row">
      {% for producto in productos %}
      <div class="col-12 col-md-6 col-lg-4 mb-4">
        <div class="card shadow-sm h-100">
          <img src="{{ producto.imagen }}" class="card-img-top img-producto">
          <div class="card-body">
            <h5 class="card-title">{{ producto.nombre }}</h5>
            <p class="precio">$ {{ producto.precio | pesos }}</p>

            <p class="card-text">{{ producto.descripcion }}</p>
            <a href="https://wa.me/543794256156?text=Hola%20quiero%20consultar%20por%20{{ producto.nombre }}"
              class="btn-producto" target="_blank">
              Consultar por WhatsApp
            </a>

          </div>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>

  <a href="https://wa.me/543794256156" class="whatsapp-float" target="_blank">

    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="white">

        d="M20.52 3.48A11.8 11.8 0 0 0 12.03 0C5.4 0 .04 5.36.04 12a11.9 11.9 0 0 0 1.63 6.03L0 24l6.13-1.6A11.96 11.96 0 0 0 12.03 24c6.63 0 11.99-5.36 11.99-12 0-3.2-1.25-6.21-3.5-8.52zM12.03 22c-1.84 0-3.65-.5-5.23-1.45l-.37-.22-3.64.95.97-3.55-.24-.36A9.93 9.93 0 0 1 2.03 12c0-5.52 4.48-10 10-10 2.67 0 5.18 1.04 7.07 2.93A9.93 9.93 0 0 1 22.03 12c0 5.52-4.48 10-10 10zm5.43-7.57c-.3-.15-1.77-.87-2.05-.97-.27-.1-.47-.15-.67.15-.2.3-.77.97-.94 1.17-.17.2-.35.22-.65.07-.3-.15-1.28-.47-2.44-1.5-.9-.8-1.5-1.78-1.67-2.08-.17-.3-.02-.46.13-.6.13-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.07-.15-.67-1.62-.92-2.22-.24-.57-.49-.5-.67-.51l-.57-.01c-.2 0-.52.07-.8.37-.27.3-1.05 1.03-1.05 2.52s1.08 2.93 1.23 3.13c.15.2 2.12 3.24 5.13 4.55.72.31 1.28.49 1.72.63.72.23 1.37.2 1.89.12.58-.09 1.77-.72 2.02-1.42.25-.7.25-1.3.17-1.42-.07-.12-.27-.2-.57-.35z" />

  </a>

  <div style="text-align:center; margin:60px 0 30px 0;">
    <a href="{{ url_for('login') }}" style="color:gray; text-decoration:none;">
      © 2026 Mi Tienda
    </a>
  </div>

</body>

</html>
