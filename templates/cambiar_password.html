<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="{{ url_for('static', filename='estilos_pro.css') }}">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<title>Cambiar contraseña</title>

</head>
<body>

<div class="page-container">

<div class="card card-profesional col-12 col-sm-10 col-md-6 col-lg-4">

<div class="card-body p-4">

<h4 class="text-center mb-4">Cambiar contraseña</h4>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for categoria, mensaje in messages %}

<div class="alert alert-{{categoria}}">
{{mensaje}}
</div>

{% endfor %}
{% endif %}
{% endwith %}

<form method="POST">

<input type="password" name="actual" class="form-control form-control-lg mb-3" placeholder="Contraseña actual" required>

<input type="password" name="nueva" class="form-control form-control-lg mb-3" placeholder="Nueva contraseña" required>

<input type="password" name="confirmar" class="form-control form-control-lg mb-3" placeholder="Confirmar nueva contraseña" required>

<div class="d-grid gap-2 mt-3">

<button class="btn btn-primary btn-lg">
Cambiar contraseña
</button>

<a href="{{ url_for('admin') }}" class="btn btn-outline-secondary">
Cancelar
</a>

</div>

</form>

</div>
</div>
</div>

</body>
</html>
