<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="{{ url_for('static', filename='estilos_pro.css') }}">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<title>Login</title>

</head>
<body>

<div class="page-container">

<div class="card card-profesional col-12 col-sm-10 col-md-6 col-lg-4">

<div class="card-body p-4">

<h4 class="text-center mb-4">Panel administrador</h4>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for categoria, mensaje in messages %}

<div class="alert alert-{{categoria}}">
{{mensaje}}
</div>

{% endfor %}
{% endif %}
{% endwith %}

<form method="POST">

<div class="mb-3">
<input type="text" name="username" class="form-control form-control-lg" placeholder="Usuario" required>
</div>

<div class="mb-3">
<input type="password" name="password" class="form-control form-control-lg" placeholder="Contraseña" required>
</div>

<div class="d-grid gap-2">

<button class="btn btn-primary btn-lg">
Ingresar
</button>

<a href="{{ url_for('index') }}" class="btn btn-outline-secondary">
Volver al inicio
</a>

</div>

</form>

</div>
</div>
</div>

</body>
</html>
